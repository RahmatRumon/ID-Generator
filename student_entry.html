<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration | Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #f8fafc;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 100%);
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px;
        }
        .form-container { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 40px; border-radius: 24px; 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); 
            width: 100%; max-width: 450px;
            backdrop-filter: blur(10px);
            border: 1px solid white;
        }
        h2 { text-align: center; color: #1e293b; margin-bottom: 30px; font-weight: 700; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #475569; font-size: 14px; }
        input { 
            width: 100%; padding: 12px 16px; border: 1.5px solid #e2e8f0; 
            border-radius: 12px; box-sizing: border-box; font-family: inherit;
            transition: all 0.2s; background: #fdfdfd;
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }
        button { 
            width: 100%; padding: 14px; background: var(--primary); border: none; 
            color: white; font-size: 16px; font-weight: 700; border-radius: 12px; 
            cursor: pointer; transition: 0.3s; margin-top: 10px;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }
        button:hover { background: var(--primary-dark); transform: translateY(-1px); }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Student Registration</h2>
    <form id="studentForm">
        <div class="form-group"><label>Full Name</label><input type="text" id="name" placeholder="Ex: Alexander Smith" required></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group"><label>Student ID</label><input type="text" id="id" placeholder="STU-123" required></div>
            <div class="form-group"><label>Date of Birth</label><input type="date" id="dob" required></div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group"><label>Class</label><input type="text" id="class" placeholder="Grade 10" required></div>
            <div class="form-group"><label>Roll Number</label><input type="text" id="roll" placeholder="05" required></div>
        </div>
        <div class="form-group"><label>Blood Group</label><input type="text" id="blood" placeholder="O+ Positive" required></div>
        <div class="form-group"><label>Guardian's Name</label><input type="text" id="guardian" required></div>
        <div class="form-group"><label>Mobile Number</label><input type="tel" id="mobile" required></div>
        <div class="form-group"><label>Student Photo</label><input type="file" id="photo" accept="image/*" required></div>
        <button type="submit">Generate ID Card</button>
    </form>
</div>

<script>
    document.getElementById('studentForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const photoFile = document.getElementById('photo').files[0];
        const reader = new FileReader();

        reader.onloadend = function() {
            const studentData = {
                name: document.getElementById('name').value,
                id: document.getElementById('id').value,
                dob: document.getElementById('dob').value,
                class: document.getElementById('class').value,
                roll: document.getElementById('roll').value,
                blood: document.getElementById('blood').value,
                guardian: document.getElementById('guardian').value,
                mobile: document.getElementById('mobile').value,
                photo: reader.result
            };
            localStorage.setItem('currentStudent', JSON.stringify(studentData));
            window.location.href = 'student_id.html';
        };
        if (photoFile) { reader.readAsDataURL(photoFile); }
    });
</script>
</body>
</html>
